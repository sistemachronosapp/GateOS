<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortex Technologia | Master SGBD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; font-family: 'Inter', sans-serif; }
        .navbar-custom { background: rgba(15, 23, 42, 0.9); border-bottom: 1px solid #334155; }
        .text-primary-custom { color: #3b82f6 !important; }
        .card-metric { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; transition: 0.3s; }
        .card-metric:hover { transform: translateY(-5px); border-color: #3b82f6; }
        .table-custom { --bs-table-bg: transparent; --bs-table-color: #cbd5e1; --bs-table-border-color: #334155; }
        .login-box { max-width: 400px; margin: 100px auto; background-color: #1e293b; border: 1px solid #334155; border-radius: 16px; }
        .form-control { background-color: #0f172a; border-color: #334155; color: white; }
        .form-control:focus { background-color: #0f172a; border-color: #3b82f6; color: white; box-shadow: none; }
        .btn-custom { background-color: #3b82f6; color: white; font-weight: bold; border: none; }
        .btn-custom:hover { background-color: #2563eb; color: white; }
    </style>
</head>
<body>

    <div id="login-area" class="container">
        <div class="login-box p-5 text-center shadow-lg">
            <i class="bi bi-lightning-charge-fill fs-1 text-primary-custom"></i>
            <h3 class="fw-bold mt-3 mb-4 text-white">MAINFRAME</h3>
            <input type="email" id="master-email" class="form-control mb-3 py-2" placeholder="E-mail Master">
            <input type="password" id="master-pass" class="form-control mb-4 py-2" placeholder="Senha de Acesso">
            <button onclick="logarMaster()" class="btn btn-custom w-100 py-2">AUTENTICAR</button>
        </div>
    </div>

    <div id="dashboard-area" style="display: none;">
        
        <nav class="navbar navbar-custom px-4 py-3 sticky-top">
            <div class="container-fluid">
                <span class="navbar-brand fw-bold text-white mb-0 h1 d-flex align-items-center">
                    <i class="bi bi-cpu text-primary-custom me-2"></i> CORTEX SGBD
                </span>
                <button onclick="sairMaster()" class="btn btn-sm btn-outline-danger fw-bold px-3">
                    <i class="bi bi-power me-1"></i> DESCONECTAR
                </button>
            </div>
        </nav>

        <div class="container mt-4">
            
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="card-metric p-4 text-center">
                        <i class="bi bi-currency-dollar fs-1 text-success mb-2 d-block"></i>
                        <h5 class="text-secondary fw-bold" style="font-size: 0.8rem;">RECEITA (MRR)</h5>
                        <h2 class="text-white fw-bold m-0" id="metric-mrr">R$ --,--</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card-metric p-4 text-center">
                        <i class="bi bi-buildings fs-1 text-primary-custom mb-2 d-block"></i>
                        <h5 class="text-secondary fw-bold" style="font-size: 0.8rem;">CLIENTES ATIVOS</h5>
                        <h2 class="text-white fw-bold m-0" id="metric-clientes">--</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card-metric p-4 text-center">
                        <i class="bi bi-router fs-1 text-info mb-2 d-block"></i>
                        <h5 class="text-secondary fw-bold" style="font-size: 0.8rem;">PORTÕES (MQTT)</h5>
                        <h2 class="text-white fw-bold m-0" id="metric-portoes">--</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card-metric p-4 text-center border-danger border-opacity-50">
                        <i class="bi bi-exclamation-triangle fs-1 text-danger mb-2 d-block"></i>
                        <h5 class="text-secondary fw-bold" style="font-size: 0.8rem;">INADIMPLENTES</h5>
                        <h2 class="text-white fw-bold m-0" id="metric-inadimplentes">--</h2>
                    </div>
                </div>
            </div>

            <div class="card bg-transparent border-0">
                <div class="card-body p-0">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold text-white m-0">Gerenciamento de Instalações</h5>
                        <button class="btn btn-sm btn-outline-secondary" onclick="carregarClientes()">
                            <i class="bi bi-arrow-clockwise"></i> Atualizar Dados
                        </button>
                    </div>
                    
                    <div class="table-responsive bg-dark rounded-3 border border-secondary border-opacity-50">
                        <table class="table table-custom table-hover align-middle m-0">
                            <thead class="table-dark">
                                <tr>
                                    <th class="py-3 px-4">Condomínio/Empresa</th>
                                    <th class="py-3">Síndico</th>
                                    <th class="py-3 text-center">Unidades</th>
                                    <th class="py-3">Status Fatura</th>
                                    <th class="py-3 text-end px-4">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-clientes">
                                <tr>
                                    <td colspan="5" class="text-center py-4 text-secondary">
                                        <div class="spinner-border spinner-border-sm me-2" role="status"></div> Carregando dados do banco...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="master.js"></script>
</body>
</html>
