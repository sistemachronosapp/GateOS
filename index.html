<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Instalação GateOS</title>
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --primary: #3b82f6; --text: #f1f5f9; --input-bg: #334155; }
    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; }
    body { background-color: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .container { background-color: var(--card); border-radius: 16px; padding: 30px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    h1 { text-align: center; color: var(--primary); font-size: 1.8rem; margin-bottom: 5px; }
    .subtitle { text-align: center; color: #94a3b8; font-size: 0.9rem; margin-bottom: 25px; }
    
    .info-box { background: rgba(59, 130, 246, 0.1); border: 1px solid var(--primary); border-radius: 8px; padding: 15px; margin-bottom: 20px; text-align: center; }
    .info-label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
    .info-value { font-size: 1.2rem; font-weight: bold; margin: 5px 0; letter-spacing: 1px; }
    .copy-btn { background: none; border: none; color: var(--primary); font-size: 0.8rem; cursor: pointer; text-decoration: underline; padding: 5px; }

    label { display: block; margin: 15px 0 5px; color: #cbd5e1; font-size: 0.9rem; }
    select, input { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #475569; color: white; border-radius: 8px; font-size: 1rem; outline: none; transition: 0.2s; }
    select:focus, input:focus { border-color: var(--primary); }
    
    .password-wrapper { position: relative; }
    .toggle-pass { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #94a3b8; font-size: 1.2rem; }

    .btn-submit { margin-top: 30px; width: 100%; background: var(--primary); color: white; padding: 14px; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3); }
    .btn-submit:active { transform: scale(0.98); }
    
    .helper-text { font-size: 0.75rem; color: #64748b; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>GateOS</h1>
    <p class="subtitle">Assistente de Configuração</p>

    <div class="info-box">
      <div class="info-label">Serial Number (ID)</div>
      <div class="info-value" id="deviceId">%DEVICEID%</div>
      <button class="copy-btn" onclick="copyId()">Copiar ID para Cadastro</button>
    </div>

    <form action="/save" method="POST">
      <label>1. Selecione sua Rede Wi-Fi</label>
      <select name="ssid" required>
        %WIFI_OPTIONS%
      </select>

      <label>2. Senha do Wi-Fi</label>
      <div class="password-wrapper">
        <input type="password" name="pass" id="passInput" placeholder="Sua senha de internet" required>
        <span class="toggle-pass" onclick="togglePass()">👁️</span>
      </div>

      <label>3. Código de Segurança</label>
      <input type="number" name="dev_code" value="%DEV_CODE%" placeholder="Padrão: 1234">
      <p class="helper-text">Senha usada para autorizar a abertura do portão.</p>

      <button type="submit" class="btn-submit">SALVAR E CONECTAR</button>
    </form>
  </div>

  <script>
    function togglePass() {
      var x = document.getElementById("passInput");
      x.type = (x.type === "password") ? "text" : "password";
    }
    
    function copyId() {
      var range = document.createRange();
      range.selectNode(document.getElementById("deviceId"));
      window.getSelection().removeAllRanges(); 
      window.getSelection().addRange(range); 
      document.execCommand("copy");
      window.getSelection().removeAllRanges();
      alert("ID Copiado! Cole no painel do GateOS.");
    }
  </script>
</body>
</html>
